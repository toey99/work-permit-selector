<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Category Selection - เลือกประเภทงาน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans Thai', sans-serif;
            background-color: #f8fafc;
        }
        .category-card {
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }
        .category-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .category-card.selected {
            border-color: #3b82f6;
            background-color: #eff6ff;
            ring: 2px solid #3b82f6;
        }
        .pinyin {
            color: #64748b;
            font-style: italic;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header Area -->
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">ประเภทงานที่ขออนุญาต (工作类型)</h1>
            <p class="text-gray-600">กรุณาเลือกหมวดหมู่ที่ต้องการเพื่อดูรายละเอียดหรือคัดลอกข้อมูล</p>
        </header>

        <!-- Selection Summary (Floating or Top) -->
        <div id="selection-summary" class="sticky top-4 z-10 mb-6 hidden">
            <div class="bg-blue-600 text-white p-4 rounded-xl shadow-lg flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <span class="font-bold">เลือกแล้ว: </span>
                    <span id="selected-text" class="text-sm md:text-base"></span>
                </div>
                <button onclick="copyToClipboard()" class="bg-white text-blue-600 px-6 py-2 rounded-full font-bold hover:bg-blue-50 transition-colors">
                    คัดลอกข้อมูล (复制)
                </button>
            </div>
        </div>

        <!-- Grid Container -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="category-grid">
            <!-- Items will be generated by JS -->
        </div>

        <!-- Footer Info -->
        <footer class="mt-12 text-center text-gray-500 text-sm">
            <p>© 2026 QAL Work Permit Category Support</p>
        </footer>
    </div>

    <!-- Script to handle data and interactions -->
    <script>
        const categories = [
            { id: 1, th: "งานคัดเลือกคนหางานเพื่อจัดส่งไปทำงานต่างประเทศ", cn: "选拔求职者赴海外工作", py: "Xuǎnbá qiúzhí zhě fù hǎiwài gōngzuò" },
            { id: 2, th: "งานจัดประชุม จัดอบรม จัดสัมนา จัดนิทรรศการ หรือจัดแสดงสินค้า", cn: "组织会议、培训、研讨会、展览或商品展示", py: "Zǔzhī huìyì, péixùn, yántǎohuì, zhǎnlǎn huò shāngpǐn zhǎnshì" },
            { id: 3, th: "งานช่างซ่อมหรือติดตั้งเครื่องจักรกล", cn: "机械维修或安装工作", py: "Jīxiè wéixiū huò ānzhuāng gōngzuò" },
            { id: 4, th: "งานช่างเทคนิคระบบรถไฟฟ้า", cn: "捷运/轨道交通系统技术员工作", py: "Jiéyùn / guǐdào jiāotōng xìtǒng jìshùyuán gōngzuò" },
            { id: 5, th: "งานช่างอากาศยานหรือระบบอุปกรณ์ของอากาศยาน", cn: "航空器หรือ航空器设备系统维修工作", py: "Hángkōngqì huò hángkōngqì shèbèi xìtǒng wéixiū gōngzuò" },
            { id: 6, th: "งานตรวจสอบกระบวนการผลิตหรือปรับปรุงกระบวนการผลิต", cn: "检查或改善生产流程工作", py: "Jiǎnchá huò gǎishàn shēngchǎn liúchéng gōngzuò" },
            { id: 7, th: "งานตรวจสอบคุณภาพผลิตภัณฑ์หรือคุณภาพสินค้า", cn: "检查产品或商品质量工作", py: "Jiǎnchá chǎnpǐn huò shāngpǐn zhìliàng gōngzuò" },
            { id: 8, th: "งานตรวจสอบติดตามผลและแก้ไขปัญหาเทคนิค", cn: "跟踪检查及解决技术问题工作", py: "Gēngzōng jiǎnchá jí jiějué jìshù wèntí gōngzuò" },
            { id: 9, th: "งานตรวจสอบภายในเป็นครั้งคราว", cn: "临时内部审计工作", py: "Línshí nèibù shěnjì gōngzuò" },
            { id: 10, th: "งานตรวจสอบหรือซ่อมเครื่องจักรกลและอุปกรณ์การผลิตไฟฟ้า", cn: "检查或维修机械及发电设备工作", py: "Jiǎnchá huò wéixiū jīxiè jí fādiàn shèbèi gōngzuò" },
            { id: 11, th: "งานถ่ายทำภาพยนต์และภาพนิ่ง", cn: "电影拍摄及静态摄影工作", py: "Diànyǐng pāishè jí jìngtài shèyǐng gōngzuò" },
            { id: 12, th: "งานที่ปรึกษาในการซ่อมเครื่องจักรกลหรือระบบควบคุมเครื่องจักรกล", cn: "机械或机械控制系统维修顾问工作", py: "Jīxiè huò jīxiè kòngzhì xìtǒng wéixiū gùwèn gōngzuò" },
            { id: 13, th: "งานที่หน่วยงานภาครัฐให้การสนับสนุน (เมกะอีเวนต์/คอนเสิร์ต)", cn: "获政府机构支持的工作 (大型活动/音乐节)", py: "Huò zhèngfǔ jīgòu zhīchí de gōngzuò" },
            { id: 14, th: "งานทดสอบฝีมือช่างเพื่อจัดส่งไปทำงานต่างประเทศ", cn: "赴海外工作技能测试工作", py: "Fù hǎiwài gōngzuò jìnéng cèshì gōngzuò" },
            { id: 15, th: "งานบรรยายพิเศษด้านวิชาการ", cn: "特别学术讲座/演讲工作", py: "Tèbié xuéshù jiǎngzuò/yǎnjiǎng gōngzuò" },
            { id: 16, th: "งานสาธิตและทดสอบเครื่องจักรกล", cn: "机械演示及测试工作", py: "Jīxiè yǎnshì jí cèshì gōngzuò" },
            { id: 17, th: "งานอำนวยการด้านการบิน", cn: "航空运营管理/指挥工作", py: "Hángkōng yùnyíng guǎnlǐ/zhǐhuī gōngzuò" },
            { id: 18, th: "ที่ปรึกษาในการติดตั้งและซ่อมเครื่องปรับอากาศ", cn: "空调安装及维修顾问", py: "Kōngtiáo ānzhuāng jí wéixiū gùwèn" }
        ];

        let selectedId = null;

        const grid = document.getElementById('category-grid');
        const summary = document.getElementById('selection-summary');
        const selectedText = document.getElementById('selected-text');

        // Render Cards
        categories.forEach(cat => {
            const card = document.createElement('div');
            card.className = "category-card bg-white p-6 rounded-2xl border-2 border-transparent shadow-sm flex flex-col gap-3 relative overflow-hidden";
            card.id = `card-${cat.id}`;
            card.onclick = () => selectCategory(cat.id);
            
            card.innerHTML = `
                <div class="flex items-start justify-between">
                    <span class="bg-gray-100 text-gray-500 font-bold w-10 h-10 flex items-center justify-center rounded-full text-lg">
                        ${cat.id}
                    </span>
                </div>
                <div>
                    <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-1">ไทย</h3>
                    <p class="text-gray-900 font-medium leading-tight">${cat.th}</p>
                </div>
                <div class="mt-2">
                    <h3 class="text-sm font-semibold text-blue-600 uppercase tracking-wide mb-1">Chinese (中文)</h3>
                    <p class="text-xl font-bold text-gray-900">${cat.cn}</p>
                    <p class="pinyin text-sm mt-1">${cat.py}</p>
                </div>
            `;
            grid.appendChild(card);
        });

        function selectCategory(id) {
            // Remove previous selection
            if (selectedId) {
                document.getElementById(`card-${selectedId}`).classList.remove('selected');
            }
            
            // Add new selection
            selectedId = id;
            const card = document.getElementById(`card-${id}`);
            card.classList.add('selected');

            // Update Summary
            const cat = categories.find(c => c.id === id);
            selectedText.innerText = `${cat.id}. ${cat.th} (${cat.cn})`;
            summary.classList.remove('hidden');
            
            // Smooth scroll to top summary if on mobile
            if (window.innerWidth < 768) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function copyToClipboard() {
            if (!selectedId) return;
            const cat = categories.find(c => c.id === selectedId);
            const textToCopy = `ประเภทงานที่เลือก:\n${cat.id}. ${cat.th}\n${cat.cn}\n${cat.py}`;
            
            const textArea = document.createElement("textarea");
            textArea.value = textToCopy;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);

            const btn = summary.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "คัดลอกสำเร็จ! (已复制)";
            btn.classList.replace('bg-white', 'bg-green-400');
            btn.classList.replace('text-blue-600', 'text-white');
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.replace('bg-green-400', 'bg-white');
                btn.classList.replace('text-white', 'text-blue-600');
            }, 2000);
        }
    </script>
</body>
</html>
