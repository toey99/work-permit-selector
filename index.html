<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QAL Work Permit Categories 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans Thai', sans-serif;
            background-color: #f8fafc;
        }
        .category-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 1px solid #e2e8f0;
        }
        .category-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1);
            border-color: #3b82f6;
        }
        .category-card.selected {
            border-color: #2563eb;
            background-color: #f0f7ff;
            ring: 2px solid #2563eb;
        }
        .icon-container {
            transition: transform 0.3s ease;
        }
        .category-card:hover .icon-container {
            transform: scale(1.1);
        }
        .pinyin {
            color: #94a3b8;
            font-size: 0.75rem;
        }
        @media print {
            .no-print { display: none; }
            body { background: white; padding: 0; }
            .category-card { break-inside: avoid; shadow: none; border: 1px solid #eee; }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="mb-10 text-center no-print">
            <div class="inline-flex items-center gap-2 bg-blue-50 text-blue-700 px-4 py-1.5 rounded-full text-sm font-bold mb-4 border border-blue-100">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                </span>
                2026 QAL OFFICIAL SUPPORT
            </div>
            <h1 class="text-4xl font-extrabold text-slate-900 mb-3 tracking-tight">เลือกประเภทงานที่ขออนุญาต</h1>
            <p class="text-lg text-slate-500">工作许可类别清单 • Work Permit Category Selection</p>
            
            <div class="mt-8 flex flex-wrap justify-center gap-4">
                <button onclick="window.print()" class="flex items-center gap-2 bg-slate-900 text-white px-6 py-3 rounded-xl font-bold hover:bg-slate-800 transition-all shadow-lg active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                    พิมพ์เอกสาร / บันทึก PDF
                </button>
            </div>
        </header>

        <!-- Selection Bar -->
        <div id="selection-summary" class="sticky top-6 z-30 mb-10 hidden no-print">
            <div class="bg-white/80 backdrop-blur-md border border-blue-200 p-4 rounded-2xl shadow-xl flex flex-col md:flex-row justify-between items-center gap-4 border-l-8 border-l-blue-600">
                <div class="flex items-center gap-4">
                    <div id="selected-icon-box" class="p-3 bg-blue-600 text-white rounded-lg">
                        <!-- Icon will change -->
                    </div>
                    <div>
                        <p class="text-xs font-bold text-blue-600 uppercase tracking-widest">หมวดที่เลือก (已选类别):</p>
                        <p id="selected-text" class="text-lg font-bold text-slate-900 leading-tight"></p>
                    </div>
                </div>
                <button onclick="copyToClipboard()" id="copy-btn" class="w-full md:w-auto bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-md active:scale-95 flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    คัดลอกข้อมูล (复制)
                </button>
            </div>
        </div>

        <!-- Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5" id="category-grid">
            <!-- Dynamic Content -->
        </div>

        <!-- Footer -->
        <footer class="mt-20 border-t border-slate-200 pt-10 pb-10 text-center">
            <div class="flex justify-center gap-4 mb-4">
                <div class="h-1 w-12 bg-blue-600 rounded-full"></div>
                <div class="h-1 w-4 bg-blue-200 rounded-full"></div>
                <div class="h-1 w-4 bg-blue-200 rounded-full"></div>
            </div>
            <p class="text-slate-900 font-bold text-lg">2026 QAL Work Permit Category Support</p>
            <p class="text-slate-400">Professional Assistance for Thai-Chinese Labor Compliance</p>
        </footer>
    </div>

    <script>
        const categories = [
            { id: 1, th: "งานคัดเลือกคนหางานเพื่อไปทำงานต่างประเทศ", cn: "选拔求职者赴海外工作", py: "Xuǎnbá qiúzhí zhě fù hǎiwài gōngzuò", icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20M2 12h20"/><path d="M12 7v10M12 7l-3 3M12 7l3 3"/></svg>' },
            { id: 2, th: "งานจัดประชุม จัดอบรม จัดสัมนา หรือนิทรรศการ", cn: "组织会议、培训、研讨会或展览", py: "Zǔzhī huìyì, péixùn, yántǎohuì huò zhǎnlǎn", icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>' },
            { id: 3, th: "งานช่างซ่อมหรือติดตั้งเครื่องจักรกล", cn: "机械维修或安装工作", py: "Jīxiè wéixiū huò ānzhuāng gōngzuò", icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>' },
            { id: 4, th: "งานช่างเทคนิคระบบรถไฟฟ้า", cn: "捷运/轨道交通系统技术员", py: "Jiéyùn / guǐdào jiāotōng jìshùyuán", icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="3" width="16" height="15" rx="2"/><line x1="4" y1="11" x2="20" y2="11"/><line x1="8" y1="15" x2="8" y2="15.01"/><line x1="16" y1="15" x2="16" y2="15.01"/><path d="m7 21 2-3"/><path d="m17 21-2-3"/></svg>' },
            { id: 5, th: "งานช่างอากาศยานหรือระบบอุปกรณ์อากาศยาน", cn: "航空器或航空设备系统维修", py: "Hángkōngqì huò hángkōng shèbèi wéixiū", icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>' },
            { id: 6, th: "งานตรวจสอบหรือปรับปรุงกระบวนการผลิต", cn: "检查或改善生产流程", py: "Jiǎnchá huò gǎishàn shēngchǎn liúchéng", icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' },
            { id: 7, th: "งานตรวจสอบคุณภาพผลิตภัณฑ์หรือสินค้า", cn: "检查产品或商品质量", py: "Jiǎnchá chǎnpǐn huò shāngpǐn zhìliàng", icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v3"/><path d="m21 12-9-4-9 4V8l9 4 9-4v4Z"/><path d="M3 12v6a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-6"/><path d="m15 15-3 3-3-3"/></svg>' },
            { id: 8, th: "งานตรวจสอบติดตามผลและแก้ไขปัญหาเทคนิค", cn: "跟踪检查及解决技术问题", py: "Gēngzōng jiǎnchá jí jiějué jìshù wèntí", icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 14 4-4"/><path d="m3.34 19 8.66-8.66"/><circle cx="19" cy="5" r="2"/><path d="m19 19-2-2"/><path d="m5 5 2 2"/><path d="m5 19 2-2"/><path d="m19 5-2 2"/><path d="M5 12h14"/></svg>' },
            { id: 9, th: "งานตรวจสอบภายในเป็นครั้งคราว", cn: "临时内部审计工作", py: "Línshí nèibù shěnjì gōngzuò", icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>' },
            { id: 10, th: "งานตรวจสอบ/ซ่อมเครื่องจักรผลิตไฟฟ้า", cn: "检查或维修发电设备", py: "Jiǎnchá huò wéixiū fādiàn shèbèi", icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/></svg>' },
            { id: 11, th: "งานถ่ายทำภาพยนต์และภาพนิ่ง", cn: "电影拍摄及静态摄影", py: "Diànyǐng pāishè jí jìngtài shèyǐng", icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>' },
            { id: 12, th: "งานที่ปรึกษาซ่อม/ระบบควบคุมเครื่องจักร", cn: "机械或控制系统维修顾问", py: "Jīxiè huò kòngzhì xìtǒng wéixiū gùwèn", icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><path d="M8 10h8"/><path d="M8 6h8"/></svg>' },
            { id: 13, th: "งานสนับสนุนภาครัฐ (เมกะอีเวนต์/คอนเสิร์ต)", cn: "政府支持项目 (大型活动/音乐节)", py: "Huò zhèngfǔ jīgòu zhīchí de gōngzuò", icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>' },
            { id: 14, th: "งานทดสอบฝีมือช่างส่งไปทำงานต่างประเทศ", cn: "赴海外工作技能测试", py: "Fù hǎiwài gōngzuò jìnéng cèshì", icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>' },
            { id: 15, th: "งานบรรยายพิเศษด้านวิชาการ", cn: "特别学术讲座/演讲", py: "Tèbié xuéshù jiǎngzuò/yǎnjiǎng", icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>' },
            { id: 16, th: "งานสาธิตและทดสอบเครื่องจักรกล", cn: "机械演示及测试", py: "Jีxiè yǎnshì jí cèshì gōngzuò", icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 9l5 3-5 3V9z"/><circle cx="12" cy="12" r="10"/></svg>' },
            { id: 17, th: "งานอำนวยการด้านการบิน", cn: "航空运营管理/指挥", py: "Hángkōng yùnyíng guǎnlǐ/zhǐhuī", icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 15h13l4 4"/><path d="m3 9 13 1 4-4"/><path d="M5 12h14"/><path d="m16 8 1-3h3"/><path d="m16 16 1 3h3"/></svg>' },
            { id: 18, th: "ที่ปรึกษาการติดตั้ง/ซ่อมเครื่องปรับอากาศ", cn: "空调安装及维修顾问", py: "Kōngtiáo ānzhuāng jí wéixiū gùwèn", icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h20"/><path d="M2 21h20"/><path d="M3 21v-3.5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2V21"/><path d="M6 3v3"/><path x="10" y="3" d="M10 3v3"/><path d="M14 3v3"/><path d="M18 3v3"/><path d="M7 11h10"/></svg>' }
        ];

        let selectedId = null;
        const grid = document.getElementById('category-grid');
        const summary = document.getElementById('selection-summary');
        const selectedText = document.getElementById('selected-text');
        const selectedIconBox = document.getElementById('selected-icon-box');

        // Render cards
        categories.forEach(cat => {
            const card = document.createElement('div');
            card.className = "category-card bg-white p-6 rounded-2xl flex flex-col gap-4 relative overflow-hidden";
            card.id = `card-${cat.id}`;
            card.onclick = () => selectCategory(cat.id);
            
            card.innerHTML = `
                <div class="flex justify-between items-start">
                    <span class="bg-slate-100 text-slate-500 font-bold w-9 h-9 flex items-center justify-center rounded-lg text-sm">
                        ${cat.id}
                    </span>
                    <div class="icon-container text-blue-600 w-10 h-10">
                        ${cat.icon}
                    </div>
                </div>
                <div>
                    <p class="text-slate-900 font-bold text-sm md:text-base leading-snug mb-3">${cat.th}</p>
                    <div class="pt-3 border-t border-slate-50">
                        <p class="text-blue-700 font-bold text-lg mb-0.5">${cat.cn}</p>
                        <p class="pinyin font-medium">${cat.py}</p>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });

        function selectCategory(id) {
            if (selectedId) document.getElementById(`card-${selectedId}`).classList.remove('selected');
            selectedId = id;
            const activeCard = document.getElementById(`card-${id}`);
            activeCard.classList.add('selected');
            
            const cat = categories.find(c => c.id === id);
            selectedText.innerHTML = `${cat.id}. ${cat.th} <br> <span class="text-white/80 font-normal text-base">${cat.cn}</span>`;
            selectedIconBox.innerHTML = `<div class="w-8 h-8 text-white">${cat.icon}</div>`;
            summary.classList.remove('hidden');

            // Scroll feedback for mobile
            if(window.innerWidth < 768) {
                window.scrollTo({ top: summary.offsetTop - 20, behavior: 'smooth' });
            }
        }

        function copyToClipboard() {
            if (!selectedId) return;
            const cat = categories.find(c => c.id === selectedId);
            const textToCopy = `ประเภทงาน: ${cat.id}. ${cat.th}\n中文: ${cat.cn}\nPinyin: ${cat.py}`;
            
            const textArea = document.createElement("textarea");
            textArea.value = textToCopy;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);

            const btn = document.getElementById('copy-btn');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = `<span>คัดลอกสำเร็จ! (已复制)</span>`;
            btn.classList.replace('bg-blue-600', 'bg-green-600');
            
            setTimeout(() => {
                btn.innerHTML = originalHtml;
                btn.classList.replace('bg-green-600', 'bg-blue-600');
            }, 2000);
        }
    </script>
</body>
</html>
